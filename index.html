<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Game Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <div class="hero-text">
            <h1>Retro Game Vault</h1>
            <p>Find classic games fast with search, filters, and quick access to detailed game info.</p>
        </div>
        <div class="hero-controls">
            <div class="search-wrapper">
                <input type="text" id="searchBar" placeholder="Search games..." onkeyup="searchGames()" />
                <button id="searchBtn" onclick="searchGames()">Search</button>
            </div>
            <button id="themeToggle">🌙 Dark Mode</button>
        </div>
    </div>
    <div class="filter-row">
        <label for="genreFilter">Genre</label>
        <select id="genreFilter">
            <option value="all">All Genres</option>
            <option value="action">Action</option>
            <option value="adventure">Adventure</option>
            <option value="rpg">RPG</option>
            <option value="shooter">Shooter</option>
            <option value="strategy">Strategy</option>
        </select>
        <button id="filterBtn" onclick="filterByGenre()">Apply Filter</button>
    </div>
    <div id="Games"></div>
    <button onclick="loadMore()" id="loadMoreBtn">Load More</button>

    <div id="gameModal" class="modal hidden">
        <div class="modal-content">
            <button id="closeModal" class="close-btn">×</button>
            <div id="modalDetails"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
